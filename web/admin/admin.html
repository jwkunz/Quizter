<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiztik Admin</title>
  <style>
    :root {
      --bg: #050505;
      --fg: #f8f9ff;
      --neon1: #ff8f00;
      --neon2: #00f6ff;
      --panel: #101010;
    }
    body { margin: 0; font-family: "Trebuchet MS", sans-serif; background: linear-gradient(135deg, #0b0b0b, #000); color: var(--fg); }
    .wrap { max-width: 780px; margin: 2rem auto; padding: 1rem; }
    .card { background: var(--panel); border: 1px solid #222; box-shadow: 0 0 24px #ff8f0033; border-radius: 12px; padding: 1rem; }
    h1 { color: var(--neon1); text-shadow: 0 0 8px #ff8f00aa; }
    .small { opacity: .8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Quiztik Admin</h1>
      <p>Admin interface scaffold. Controls and editor will be added in next stages.</p>
      <p class="small">Single-file HTML for cross-platform browser launch.</p>
    </div>
  </div>
</body>
</html>
