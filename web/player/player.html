<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quiztik Player</title>
  <style>
    :root {
      --bg: #070707;
      --fg: #f6fbff;
      --neon1: #00f6ff;
      --neon2: #ff2d95;
      --neon3: #b7ff00;
      --panel: #101010;
    }
    body { margin: 0; font-family: "Trebuchet MS", sans-serif; background: radial-gradient(circle at top, #151515, var(--bg)); color: var(--fg); }
    .wrap { max-width: 780px; margin: 2rem auto; padding: 1rem; }
    .card { background: var(--panel); border: 1px solid #222; box-shadow: 0 0 24px #00f6ff33; border-radius: 12px; padding: 1rem; }
    h1 { color: var(--neon1); text-shadow: 0 0 8px #00f6ffaa; }
    .small { opacity: .8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Quiztik Player</h1>
      <p>Player interface scaffold. Join and game UI will be added in next stages.</p>
      <p class="small">Single-file HTML for cross-platform browser launch.</p>
    </div>
  </div>
</body>
</html>
