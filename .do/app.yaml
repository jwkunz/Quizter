name: quizster
region: nyc

domains:
  - domain: quizster.live
    type: PRIMARY
    minimum_tls_version: "1.2"

services:
  - name: quizster-web
    github:
      repo: jwkunz/Quizter
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: QUIZSTER_HOST
        value: "0.0.0.0"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZSTER_PORT
        value: "8080"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZSTER_PUBLIC_BASE_URL
        value: https://quizster.live
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZSTER_OPEN_BROWSER
        value: "0"
        scope: RUN_TIME
        type: GENERAL
      - key: QUIZSTER_SPAWN_TERMINAL
        value: "0"
        scope: RUN_TIME
        type: GENERAL

alerts:
  - rule: DEPLOYMENT_FAILED
