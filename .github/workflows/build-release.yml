name: build-and-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate_tag_on_main:
    runs-on: ubuntu-latest
    outputs:
      is_on_main: ${{ steps.verify.outputs.is_on_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        id: verify
        shell: bash
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "is_on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag does not point to a commit on main; skipping release."
            echo "is_on_main=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: validate_tag_on_main
    if: needs.validate_tag_on_main.outputs.is_on_main == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build and package server artifact
        shell: bash
        run: |
          scripts/build_release.sh "$(cat VERSION)" "${{ matrix.target }}"

      - name: Verify packaged artifact
        shell: bash
        run: |
          scripts/verify_artifacts.sh "$(cat VERSION)" "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quizter-server-${{ matrix.target }}
          path: dist/quizter-server-${{ matrix.target }}-*.zip

  release:
    needs: [validate_tag_on_main, build]
    if: needs.validate_tag_on_main.outputs.is_on_main == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release-files
          find release-artifacts -type f -name "*.zip" -exec cp {} release-files/ \;
          ls -la release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-files/*.zip
          generate_release_notes: true
